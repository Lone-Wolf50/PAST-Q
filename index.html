<body>
  <style>
    body {
      background-color: var(--bg-base, #0f0c1b);
      margin: 0;
      font-family: system-ui, -apple-system, BlinkMacSystemFont, "Segoe UI", Roboto, sans-serif;
    }
    #custom-loader {
      position: fixed;
      top: 0;
      left: 0;
      width: 100vw;
      height: 100dvh;
      background: #0f0c1b;
      z-index: 999999;
      display: flex;
      flex-direction: column;
      align-items: center;
      justify-content: center;
      transition: opacity 0.8s ease-out;
    }
    .loader-logo {
      width: 80px;
      height: 80px;
      margin-bottom: 2rem;
      border-radius: 20%;
      box-shadow: 0 10px 25px -5px rgba(0, 0, 0, 0.5);
      animation: dropIn 1s cubic-bezier(0.175, 0.885, 0.32, 1.275) forwards;
    }
    .quote-main {
      font-size: 0.95rem;
      font-weight: 500;
      letter-spacing: 0.15em;
      color: #9ca3af;
      text-transform: uppercase;
      text-align: center;
      opacity: 0;
      animation: fadeIn 1s ease-out 0.5s forwards;
      display: flex;
      gap: 0.5rem;
      align-items: center;
      height: 24px;
    }
    .quote-highlight {
      background: linear-gradient(135deg, #fcd34d, #d97706);
      -webkit-background-clip: text;
      background-clip: text;
      -webkit-text-fill-color: transparent;
      font-weight: 800;
      transition: opacity 0.4s ease-in-out, transform 0.4s ease-in-out;
      display: inline-block;
    }
    .fade-out {
      opacity: 0;
      transform: translateY(-5px);
    }
    .fade-in {
      opacity: 1;
      transform: translateY(0);
    }
    @keyframes dropIn {
      0% { opacity: 0; transform: translateY(-20px) scale(0.9); }
      100% { opacity: 1; transform: translateY(0) scale(1); }
    }
    @keyframes fadeIn {
      from { opacity: 0; }
      to { opacity: 1; }
    }
  </style>

  <div id="custom-loader" style="display: none;">
    <img src="/pwa-icon-512.png" alt="PastQ" class="loader-logo" />
    <div class="quote-main">
      UNLOCKING <span id="dynamic-word" class="quote-highlight fade-in">EXCELLENCE</span>
    </div>
  </div>
  <div id="root"></div>

  <script>
    if (!sessionStorage.getItem('loaderShown')) {
      sessionStorage.setItem('loaderShown', 'true');
      const loader = document.getElementById('custom-loader');
      loader.style.display = 'flex';
      
      const words = ["EXCELLENCE", "POTENTIAL", "GREATNESS"];
      let wordIndex = 0;
      const dynamicWord = document.getElementById('dynamic-word');

      // Switch words every 1.5 seconds
      const interval = setInterval(() => {
        wordIndex++;
        if (wordIndex >= words.length) {
          clearInterval(interval);
          // After the last word shows for a bit, fade out the whole loader
          setTimeout(() => {
            loader.style.opacity = '0';
            setTimeout(() => loader.remove(), 800);
          }, 1200);
          return;
        }
        
        // Fade out the word
        dynamicWord.classList.remove('fade-in');
        dynamicWord.classList.add('fade-out');
        
        // Change text and fade back in
        setTimeout(() => {
          dynamicWord.textContent = words[wordIndex];
          dynamicWord.classList.remove('fade-out');
          dynamicWord.classList.add('fade-in');
        }, 400); // wait for fade out to complete
      }, 1500);
    } else {
      const loader = document.getElementById('custom-loader');
      if (loader) loader.remove();
    }
  </script>
  <script type="module" src="/src/main.tsx"></script>
  <script src="https://js.paystack.co/v1/inline.js" defer></script>
